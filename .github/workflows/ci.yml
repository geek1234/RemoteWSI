name: ci

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install OS dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libopenslide0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Compile-check key modules
        run: |
          python -m py_compile app/local_main.py app/local_launcher.py app/color_normalization.py

      - name: Basic import checks
        run: |
          python -c "import app.local_main; import app.color_normalization; print('ok')"
